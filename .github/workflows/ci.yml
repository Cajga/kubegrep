name: CI

on:
  # Only build and test when the Go source changes, or when a release is cut.
  push:
    branches: [ main, master ]
    paths:
      - 'main.go'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'main.go'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
